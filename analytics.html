<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteDash - التحليلات الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        body {
            background: #0f172a;
            color: #f8fafc;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight">مركز التحليلات</h1>
            <p class="text-slate-400 mt-1">متابعة أداء المنصة والنمو في الوقت الفعلي</p>
        </div>
        <div class="flex gap-3">
            <button class="glass px-4 py-2 rounded-lg text-sm hover:bg-white/10 transition">تحميل التقرير (PDF)</button>
            <select class="glass px-4 py-2 rounded-lg text-sm bg-transparent outline-none cursor-pointer">
                <option class="bg-slate-900">آخر 30 يوم</option>
                <option class="bg-slate-900">آخر 6 أشهر</option>
                <option class="bg-slate-900">هذا العام</option>
            </select>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
        
        <div class="glass p-6 rounded-3xl shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-lg">نمو الإيرادات</h3>
                <span class="text-green-400 text-sm font-medium">↑ 12.5%</span>
            </div>
            <div class="h-[300px]">
                <canvas id="revenueChart"></canvas>
            </div>
        </div>

        <div class="glass p-6 rounded-3xl shadow-2xl">
            <h3 class="font-bold text-lg mb-6 text-right">المبيعات حسب الفئة</h3>
            <div class="h-[300px]">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <div class="glass p-5 rounded-2xl border-r-4 border-blue-500">
            <p class="text-slate-400 text-sm">معدل التحويل</p>
            <h4 class="text-2xl font-bold mt-2">4.8%</h4>
        </div>
        <div class="glass p-5 rounded-2xl border-r-4 border-purple-500">
            <p class="text-slate-400 text-sm">متوسط قيمة الطلب</p>
            <h4 class="text-2xl font-bold mt-2">$142.00</h4>
        </div>
        <div class="glass p-5 rounded-2xl border-r-4 border-pink-500">
            <p class="text-slate-400 text-sm">الزوار الجدد</p>
            <h4 class="text-2xl font-bold mt-2">12,430</h4>
        </div>
        <div class="glass p-5 rounded-2xl border-r-4 border-yellow-500">
            <p class="text-slate-400 text-sm">وقت الجلسة</p>
            <h4 class="text-2xl font-bold mt-2">5m 22s</h4>
        </div>
    </div>

    <script>
        // Setup Revenue Chart
        const ctx1 = document.getElementById('revenueChart').getContext('2d');
        new Chart(ctx1, {
            type: 'line',
            data: {
                labels: ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو'],
                datasets: [{
                    label: 'الأرباح ($)',
                    data: [1200, 1900, 1700, 2500, 2200, 3100],
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                }
            }
        });

        // Setup Category Chart
        const ctx2 = document.getElementById('categoryChart').getContext('2d');
        new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: ['إلكترونيات', 'أزياء', 'ساعات', 'عطور'],
                datasets: [{
                    data: [65, 40, 80, 55],
                    backgroundColor: ['#6366f1', '#a855f7', '#ec4899', '#f59e0b'],
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                }
            }
        });
    </script>
</body>
</html>
