<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* الخطوط الذكية */
        html[lang="ar"] body { font-family: 'Cairo', sans-serif; }
        html[lang="en"] body { font-family: 'Inter', sans-serif; }

        body { transition: background-color 0.5s ease; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(0, 0, 0, 0.05); 
        }
        .dark .glass-card { 
            background: rgba(30, 41, 59, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        /* تأثير النبض للأيقونة */
        .ghost-float { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0f172a] min-h-screen flex items-center justify-center p-6 overflow-hidden transition-colors duration-500">

    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-blue-600/10 dark:bg-blue-600/5 rounded-full blur-[120px]"></div>

    <div class="fixed top-6 right-6 flex gap-3 z-50">
        <button onclick="toggleTheme()" class="glass-card p-3 rounded-2xl hover:scale-110 transition-all text-slate-600 dark:text-yellow-400">
            <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
            <i data-lucide="moon" class="w-5 h-5 block dark:hidden text-blue-600"></i>
        </button>
        <button onclick="switchLang()" class="glass-card px-4 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all dark:text-white">
            EN / AR
        </button>
    </div>

    <div class="glass-card max-w-lg w-full p-12 rounded-[3rem] text-center shadow-2xl z-10 border border-white/5 relative">
        <div class="mb-8 flex justify-center">
            <div class="p-6 bg-blue-600/10 rounded-[2rem] border border-blue-500/20 ghost-float">
                <i data-lucide="ghost" class="w-16 h-16 text-blue-600 dark:text-blue-500"></i>
            </div>
        </div>
        
        <h1 class="text-8xl font-black text-slate-900 dark:text-white mb-4 tracking-tighter opacity-20">404</h1>
        
        <h2 class="text-2xl font-black text-slate-900 dark:text-white mb-4" 
            data-en="Lost in Space?" 
            data-ar="هل تهت في الفضاء؟">
            Lost in Space?
        </h2>
        
        <p class="text-slate-500 dark:text-slate-400 mb-10 leading-relaxed text-sm font-medium"
           data-en="The page you are looking for doesn't exist or has been moved."
           data-ar="الصفحة التي تبحث عنها غير موجودة أو تم نقلها لمكان آخر.">
            The page you are looking for doesn't exist or has been moved.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="index.html" class="bg-blue-600 hover:bg-blue-700 text-white font-black py-4 px-8 rounded-2xl shadow-xl shadow-blue-600/20 transition transform hover:-translate-y-1 active:scale-95 flex items-center justify-center text-xs uppercase tracking-widest">
                <i data-lucide="home" class="mr-2 ml-2 w-4 h-4"></i>
                <span data-en="Back Home" data-ar="الرئيسية">Back Home</span>
            </a>
            <button onclick="window.history.back()" class="bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-900 dark:text-white font-black py-4 px-8 rounded-2xl border border-slate-200 dark:border-slate-700 transition flex items-center justify-center text-xs uppercase tracking-widest">
                <span data-en="Go Back" data-ar="رجوع">Go Back</span>
            </button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // ترجمة سريعة لهذه الصفحة تحديداً
        document.addEventListener('DOMContentLoaded', () => {
            const lang = localStorage.getItem('appLang') || 'en';
            document.querySelectorAll('[data-en]').forEach(el => {
                el.innerText = (lang === 'ar') ? el.getAttribute('data-ar') : el.getAttribute('data-en');
            });
            lucide.createIcons();
        });
    </script>
</body>
</html>
