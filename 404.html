<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; }
        .glass-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 overflow-hidden">

    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-blue-600/10 rounded-full blur-[120px]"></div>

    <div class="glass-card max-w-lg w-full p-12 rounded-[2rem] text-center shadow-2xl z-10 border border-white/5">
        <div class="mb-8 flex justify-center">
            <div class="p-5 bg-blue-600/10 rounded-3xl border border-blue-500/20">
                <i data-lucide="ghost" class="w-16 h-16 text-blue-500"></i>
            </div>
        </div>
        
        <h1 class="text-7xl font-black text-white mb-4 tracking-tighter">404</h1>
        <h2 class="text-2xl font-bold text-white mb-4">Lost in Space?</h2>
        <p class="text-slate-400 mb-10 leading-relaxed">
            The page you are looking for doesn't exist or has been moved. 
            Don't worry, even the best developers get lost sometimes.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="index.html" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg shadow-blue-600/20 transition transform hover:-translate-y-1 active:scale-95 flex items-center justify-center">
                <i data-lucide="home" class="mr-2 w-5 h-5"></i>
                Back Home
            </a>
            <button onclick="window.history.back()" class="bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 px-8 rounded-xl border border-slate-700 transition flex items-center justify-center">
                Go Back
            </button>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
