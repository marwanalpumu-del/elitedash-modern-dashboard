<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>EliteDash | Orders Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen flex">

    <aside class="w-72 border-r border-slate-800 p-8 hidden lg:flex flex-col h-screen sticky top-0">
        <h1 class="text-2xl font-black text-blue-500 italic mb-10 tracking-tighter">ELITEDASH</h1>
        <nav class="space-y-3 flex-1">
            <a href="index.html" class="flex items-center p-4 text-slate-400 hover:bg-slate-800 rounded-2xl transition font-semibold">
                <i data-lucide="layout-grid" class="mr-3 ml-3 w-5 h-5"></i> <span data-i18n="dash">Dashboard</span>
            </a>
            <a href="users.html" class="flex items-center p-4 text-slate-400 hover:bg-slate-800 rounded-2xl transition font-semibold">
                <i data-lucide="users" class="mr-3 ml-3 w-5 h-5"></i> <span data-i18n="users">Users</span>
            </a>
            <a href="orders.html" class="flex items-center p-4 bg-blue-600 text-white rounded-2xl shadow-lg shadow-blue-600/20 font-bold">
                <i data-lucide="shopping-bag" class="mr-3 ml-3 w-5 h-5"></i> <span data-i18n="orders">Orders</span>
            </a>
            <a href="settings.html" class="flex items-center p-4 text-slate-400 hover:bg-slate-800 rounded-2xl transition font-semibold">
                <i data-lucide="settings" class="mr-3 ml-3 w-5 h-5"></i> <span data-i18n="settings">Settings</span>
            </a>
        </nav>
        <button onclick="switchLang()" class="mt-4 p-4 bg-slate-800/50 border border-slate-700 rounded-2xl text-xs font-bold hover:bg-slate-700 transition">English / العربية</button>
    </aside>

    <main class="flex-1 p-8 lg:p-12">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
            <div>
                <h2 class="text-3xl font-bold" data-i18n="orders">Orders Management</h2>
                <p class="text-slate-500 text-sm mt-1" data-i18n="status">Real-time monitoring</p>
            </div>
            
            <div class="relative group">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                <input type="text" id="orderSearch" data-i18n-placeholder="search" placeholder="Search..." class="bg-slate-800/50 border border-slate-700 rounded-2xl py-3 pl-12 pr-6 text-sm w-full md:w-64 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-white">
            </div>
        </header>

        <div class="bg-slate-800/20 border border-slate-800 rounded-[2.5rem] overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left rtl:text-right">
                    <thead class="bg-slate-900/50 text-slate-500 text-[10px] uppercase font-black tracking-widest">
                        <tr>
                            <th class="p-8" data-i18n="orderId">Order ID</th>
                            <th class="p-8" data-i18n="customer">Customer</th>
                            <th class="p-8" data-i18n="statusLabel">Status</th>
                            <th class="p-8" data-i18n="amount">Total Amount</th>
                            <th class="p-8 text-right rtl:text-left" data-i18n="view_details">Action</th>
                        </tr>
                    </thead>
                    <tbody id="orderTableBody" class="divide-y divide-slate-800">
                        <tr class="hover:bg-slate-800/30 transition-colors">
                            <td class="p-8 font-mono text-blue-500 text-sm font-bold">#ORD-7231</td>
                            <td class="p-8 font-bold">John Doe</td>
                            <td class="p-8">
                                <span class="bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 px-3 py-1 rounded-full text-[10px] font-bold uppercase" data-i18n="status_completed">Completed</span>
                            </td>
                            <td class="p-8 font-bold">$299.00</td>
                            <td class="p-8 text-right rtl:text-left">
                                <button class="text-slate-500 hover:text-white transition-colors"><i data-lucide="external-link" class="w-4 h-4"></i></button>
                            </td>
                        </tr>
                        <tr class="hover:bg-slate-800/30 transition-colors">
                            <td class="p-8 font-mono text-blue-500 text-sm font-bold">#ORD-7232</td>
                            <td class="p-8 font-bold">Anna Smith</td>
                            <td class="p-8">
                                <span class="bg-yellow-500/10 text-yellow-500 border border-yellow-500/20 px-3 py-1 rounded-full text-[10px] font-bold uppercase" data-i18n="status_processing">Processing</span>
                            </td>
                            <td class="p-8 font-bold">$1,420.50</td>
                            <td class="p-8 text-right rtl:text-left">
                                <button class="text-slate-500 hover:text-white transition-colors"><i data-lucide="external-link" class="w-4 h-4"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        // نظام البحث الحي
        document.getElementById('orderSearch').addEventListener('keyup', function(e) {
            const term = e.target.value.toLowerCase();
            const rows = document.querySelectorAll('#orderTableBody tr');
            rows.forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(term) ? "" : "none";
            });
        });
    </script>
</body>
</html>
