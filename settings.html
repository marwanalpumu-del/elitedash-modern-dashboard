<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | EliteDash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; }
        .glass-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>

    <div class="min-h-screen flex">
        <aside class="w-64 bg-[#1e293b] border-r border-slate-800 hidden md:flex flex-col">
            <div class="p-6 text-2xl font-bold text-blue-500 tracking-tighter uppercase">Elite<span class="text-white">Dash</span></div>
            <nav class="flex-1 px-4 space-y-2">
                <a href="index.html" class="flex items-center p-3 text-slate-400 hover:bg-slate-800 rounded-lg transition-all"><i data-lucide="layout-dashboard" class="mr-3 w-5"></i> Dashboard</a>
                <a href="users.html" class="flex items-center p-3 text-slate-400 hover:bg-slate-800 rounded-lg transition-all"><i data-lucide="users" class="mr-3 w-5"></i> Users</a>
                <a href="settings.html" class="flex items-center p-3 bg-blue-600 text-white rounded-lg shadow-lg shadow-blue-500/20"><i data-lucide="settings" class="mr-3 w-5"></i> Settings</a>
            </nav>
        </aside>

        <main class="flex-1 p-8 max-w-4xl mx-auto">
            <header class="mb-10">
                <h2 class="text-3xl font-bold text-white tracking-tight">Account Settings</h2>
                <p class="text-slate-400 text-sm">Manage your profile and application preferences.</p>
            </header>

            <div class="glass-card rounded-3xl overflow-hidden shadow-2xl border border-slate-800">
                <div class="flex border-b border-slate-800 px-6">
                    <button class="py-4 px-6 text-blue-500 border-b-2 border-blue-500 font-medium">Profile</button>
                    <button class="py-4 px-6 text-slate-400 hover:text-white transition">Security</button>
                    <button class="py-4 px-6 text-slate-400 hover:text-white transition">Notifications</button>
                </div>

                <div class="p-8 space-y-8">
                    <div class="flex items-center space-x-6">
                        <img id="profilePreview" src="https://ui-avatars.com/api/?name=Marwan&background=0D8ABC&color=fff&size=128" class="w-24 h-24 rounded-2xl border-4 border-slate-800 shadow-xl object-cover">
                        <div>
                            <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition shadow-md">Change Photo</button>
                            <p class="text-slate-500 text-[10px] mt-2 uppercase font-bold tracking-widest">JPG, GIF or PNG. Max size of 800K</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-slate-400 text-xs font-bold uppercase tracking-wider mb-2">Full Name</label>
                            <input id="userNameInput" type="text" value="Marwan" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 px-4 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-slate-400 text-xs font-bold uppercase tracking-wider mb-2">Email Address</label>
                            <input id="userEmailInput" type="email" value="admin@elitedash.com" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 px-4 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                    </div>

                    <div>
                        <label class="block text-slate-400 text-xs font-bold uppercase tracking-wider mb-2">Biography</label>
                        <textarea id="userBioInput" rows="4" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 px-4 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">Senior Full-Stack Developer & UI Enthusiast.</textarea>
                    </div>

                    <div class="pt-6 border-t border-slate-800 flex justify-end space-x-4">
                        <button class="px-6 py-2 text-slate-400 hover:text-white transition font-medium">Cancel</button>
                        <button id="saveBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2 rounded-xl font-bold shadow-lg shadow-blue-600/20 transition transform hover:-translate-y-1 active:scale-95">Save Changes</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // تفعيل أيقونات Lucide
        lucide.createIcons();

        // ربط العناصر
        const saveBtn = document.getElementById('saveBtn');
        const nameInput = document.getElementById('userNameInput');
        const emailInput = document.getElementById('userEmailInput');
        const bioInput = document.getElementById('userBioInput');
        const profileImg = document.getElementById('profilePreview');

        // تحميل البيانات عند فتح الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('userName');
            const savedEmail = localStorage.getItem('userEmail');
            const savedBio = localStorage.getItem('userBio');

            if (savedName) {
                nameInput.value = savedName;
                profileImg.src = `https://ui-avatars.com/api/?name=${savedName}&background=0D8ABC&color=fff&size=128`;
            }
            if (savedEmail) emailInput.value = savedEmail;
            if (savedBio) bioInput.value = savedBio;
        });

        // تنفيذ الحفظ
        saveBtn.addEventListener('click', (e) => {
            e.preventDefault();

            // تأثير التحميل
            saveBtn.innerText = 'Saving...';
            saveBtn.disabled = true;
            saveBtn.classList.add('opacity-50', 'cursor-not-allowed');

            setTimeout(() => {
                const newName = nameInput.value;
                
                // حفظ في LocalStorage
                localStorage.setItem('userName', newName);
                localStorage.setItem('userEmail', emailInput.value);
                localStorage.setItem('userBio', bioInput.value);

                // تحديث الصورة فوراً
                profileImg.src = `https://ui-avatars.com/api/?name=${newName}&background=0D8ABC&color=fff&size=128`;

                // إعادة الزر
                saveBtn.innerText = 'Save Changes';
                saveBtn.disabled = false;
                saveBtn.classList.remove('opacity-50', 'cursor-not-allowed');

                alert('Success! Your profile has been updated.');
            }, 1200);
        });
    </script>
</body>
</html>
