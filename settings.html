<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | EliteDash</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .glass-card { backdrop-filter: blur(12px); transition: all 0.3s ease; }
        .dark .glass-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }
        .light .glass-card { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0, 0, 0, 0.05); }
        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        
        @media (max-width: 768px) {
            main { padding-bottom: 90px; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 min-h-screen">

    <div class="flex">
        <aside class="w-64 bg-white dark:bg-[#1e293b] border-r border-slate-200 dark:border-slate-800 hidden md:flex flex-col h-screen sticky top-0">
            <div class="p-6">
                <h1 class="text-2xl font-bold text-blue-500 tracking-tighter uppercase">Elite<span class="text-slate-900 dark:text-white">Dash</span></h1>
            </div>
            <nav class="flex-1 px-4 space-y-2">
                <a href="index.html" class="flex items-center p-3 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all"><i data-lucide="layout-dashboard" class="mr-3 w-5 h-5"></i> Overview</a>
                <a href="users.html" class="flex items-center p-3 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all"><i data-lucide="users" class="mr-3 w-5 h-5"></i> Users</a>
                <a href="orders.html" class="flex items-center p-3 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all"><i data-lucide="shopping-bag" class="mr-3 w-5 h-5"></i> Orders</a>
                <a href="invoices.html" class="flex items-center p-3 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all"><i data-lucide="file-text" class="mr-3 w-5 h-5"></i> Invoices</a>
                <a href="settings.html" class="flex items-center p-3 bg-blue-600 text-white rounded-xl shadow-lg shadow-blue-500/20"><i data-lucide="settings" class="mr-3 w-5 h-5"></i> Settings</a>
            </nav>
        </aside>

        <main class="flex-1 p-6 md:p-10 max-w-5xl mx-auto">
            <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
                <div>
                    <h2 class="text-2xl md:text-3xl font-bold tracking-tight">Account Settings</h2>
                    <p class="text-slate-500 dark:text-slate-400 text-xs md:sm">Manage your profile, security and preferences.</p>
                </div>
                
                <div class="relative w-full md:w-72">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                    <input type="text" placeholder="Search settings..." class="w-full bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl py-2.5 pl-10 pr-4 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>
            </header>

            <div class="glass-card rounded-[2rem] overflow-hidden shadow-2xl border border-slate-200 dark:border-slate-800">
                <div class="flex border-b border-slate-200 dark:border-slate-800 px-6 bg-white/50 dark:bg-slate-800/20 overflow-x-auto no-scrollbar">
                    <button onclick="switchTab('profile')" id="btn-profile" class="tab-active py-5 px-6 font-semibold text-sm transition whitespace-nowrap">Profile</button>
                    <button onclick="switchTab('security')" id="btn-security" class="py-5 px-6 text-slate-400 hover:text-blue-500 font-semibold text-sm transition whitespace-nowrap">Security</button>
                    <button onclick="switchTab('notifications')" id="btn-notifications" class="py-5 px-6 text-slate-400 hover:text-blue-500 font-semibold text-sm transition whitespace-nowrap">Notifications</button>
                </div>

                <div id="section-profile" class="p-8 space-y-8">
                    <div class="flex flex-col md:flex-row md:items-center gap-6">
                        <img id="profilePreview" src="https://ui-avatars.com/api/?name=Marwan&background=0D8ABC&color=fff" class="w-24 h-24 rounded-3xl border-4 border-white dark:border-slate-700 shadow-xl object-cover">
                        <div class="flex flex-wrap gap-3">
                            <button onclick="document.getElementById('fileInput').click()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-xs font-bold shadow-lg shadow-blue-500/20 active:scale-95 transition">Change Photo</button>
                            <button onclick="removeAvatar()" class="bg-slate-100 dark:bg-slate-800 text-slate-500 px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-red-500 hover:text-white transition active:scale-95">Remove</button>
                        </div>
                        <input type="file" id="fileInput" class="hidden" accept="image/*">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="block text-[10px] font-bold uppercase text-slate-500 tracking-wider">Full Name</label>
                            <input id="userNameInput" type="text" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-2xl p-3.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-[10px] font-bold uppercase text-slate-500 tracking-wider">Email Address</label>
                            <input id="userEmailInput" type="email" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-2xl p-3.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition">
                        </div>
                    </div>
                </div>

                <div id="section-security" class="hidden p-8 space-y-8">
                    <div class="space-y-4">
                        <h4 class="text-sm font-bold text-blue-500 uppercase tracking-widest">Update Password</h4>
                        <input type="password" placeholder="Current Password" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-700 rounded-2xl p-3.5 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                        <input type="password" placeholder="New Password" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-700 rounded-2xl p-3.5 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="p-8 border-t border-slate-200 dark:border-slate-800 flex justify-end bg-slate-50/50 dark:bg-slate-800/10">
                    <button id="saveBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-12 py-3.5 rounded-2xl font-bold shadow-xl shadow-blue-500/20 transition-all active:scale-95 text-sm">Save Changes</button>
                </div>
            </div>
        </main>
    </div>

    <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-[#1e293b]/90 backdrop-blur-xl border-t border-slate-200 dark:border-slate-800 px-2 py-3 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center text-slate-400">
            <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
            <span class="text-[8px] mt-1 font-medium">Home</span>
        </a>
        <a href="users.html" class="flex flex-col items-center text-slate-400">
            <i data-lucide="users" class="w-5 h-5"></i>
            <span class="text-[8px] mt-1 font-medium">Users</span>
        </a>
        <a href="orders.html" class="flex flex-col items-center text-slate-400">
            <i data-lucide="shopping-bag" class="w-5 h-5"></i>
            <span class="text-[8px] mt-1 font-medium">Orders</span>
        </a>
        <a href="invoices.html" class="flex flex-col items-center text-slate-400">
            <i data-lucide="file-text" class="w-5 h-5"></i>
            <span class="text-[8px] mt-1 font-medium">Bills</span>
        </a>
        <a href="settings.html" class="flex flex-col items-center text-blue-600">
            <i data-lucide="settings" class="w-5 h-5"></i>
            <span class="text-[8px] mt-1 font-bold">Settings</span>
        </a>
    </div>

    <script>
        lucide.createIcons();

        // التبديل بين التبويبات
        function switchTab(tabName) {
            const sections = ['profile', 'security', 'notifications'];
            sections.forEach(s => {
                const section = document.getElementById(`section-${s}`);
                if (section) section.classList.add('hidden');
                const btn = document.getElementById(`btn-${s}`);
                if (btn) {
                    btn.classList.remove('tab-active', 'text-blue-500');
                    btn.classList.add('text-slate-400');
                }
            });
            document.getElementById(`section-${tabName}`).classList.remove('hidden');
            document.getElementById(`btn-${tabName}`).classList.add('tab-active');
        }

        // الحفظ التلقائي ومزامنة البيانات مع index
        document.getElementById('saveBtn').addEventListener('click', () => {
            localStorage.setItem('userName', document.getElementById('userNameInput').value);
            localStorage.setItem('userEmail', document.getElementById('userEmailInput').value);
            if(window.tempImage) localStorage.setItem('userAvatar', window.tempImage);
            alert('Profile Updated Successfully!');
            window.location.href = 'index.html';
        });

        // استرجاع البيانات عند التحميل
        document.addEventListener('DOMContentLoaded', () => {
            // مزامنة الثيم
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'dark') document.documentElement.classList.add('dark');
            
            // مزامنة الاسم والبيانات
            document.getElementById('userNameInput').value = localStorage.getItem('userName') || 'Marwan';
            document.getElementById('userEmailInput').value = localStorage.getItem('userEmail') || 'marwan@example.com';
            const avatar = localStorage.getItem('userAvatar');
            if(avatar) document.getElementById('profilePreview').src = avatar;
        });

        // إدارة الصورة الشخصية
        const fileInput = document.getElementById('fileInput');
        fileInput.addEventListener('change', function() {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('profilePreview').src = e.target.result;
                window.tempImage = e.target.result;
            };
            reader.readAsDataURL(this.files[0]);
        });
    </script>
</body>
</html>
