<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>EliteDash | Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen flex">

    <main class="flex-1 p-8 lg:p-12">
        <header class="mb-10">
            <h2 class="text-3xl font-bold" data-i18n="settings">Settings</h2>
        </header>

        <div class="max-w-xl space-y-6">
            <div class="bg-slate-800/40 p-8 rounded-[2.5rem] border border-slate-800">
                <label class="text-xs font-bold text-slate-500 uppercase block mb-3 ml-2 mr-2" data-i18n="nameLabel">Full Name</label>
                <input type="text" id="userInput" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl outline-none focus:border-blue-500 transition-all text-white font-bold">
                
                <button onclick="saveProfile()" class="w-full bg-emerald-600 mt-6 py-4 rounded-2xl font-bold shadow-lg shadow-emerald-600/20" data-i18n="save">Save Changes</button>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        document.getElementById('userInput').value = localStorage.getItem('userName') || 'Marwan';
        function saveProfile() {
            localStorage.setItem('userName', document.getElementById('userInput').value);
            alert(localStorage.getItem('appLang') === 'ar' ? 'تم الحفظ بنجاح!' : 'Saved successfully!');
            location.reload();
        }
    </script>
</body>
</html>
