<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteDash - الإعدادات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
            outline: none;
        }
        body {
            background: #0f172a;
            color: #e2e8f0;
        }
        /* Toggle Switch Style */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 16px; width: 16px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body class="p-4 md:p-10 max-w-5xl mx-auto">

    <div class="mb-10">
        <h1 class="text-3xl font-bold italic tracking-wider">الإعدادات <span class="text-blue-500">.</span></h1>
        <p class="text-slate-400 text-sm">تخصيص تفضيلات النظام والملف الشخصي</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 space-y-2">
            <button class="w-full text-right px-4 py-3 rounded-xl bg-blue-600/20 text-blue-400 border border-blue-500/30">الحساب الشخصي</button>
            <button class="w-full text-right px-4 py-3 rounded-xl hover:bg-white/5 transition">الأمان والخصوصية</button>
            <button class="w-full text-right px-4 py-3 rounded-xl hover:bg-white/5 transition">التنبيهات</button>
            <button class="w-full text-right px-4 py-3 rounded-xl hover:bg-white/5 transition text-red-400">تسجيل الخروج</button>
        </div>

        <div class="lg:col-span-2 space-y-8">
            
            <div class="glass p-8 rounded-3xl">
                <h2 class="text-xl font-semibold mb-6">المعلومات الأساسية</h2>
                <div class="flex items-center gap-6 mb-8">
                    <div class="relative">
                        <div class="w-20 h-20 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center text-2xl font-bold">JD</div>
                        <button class="absolute bottom-0 right-0 bg-blue-600 p-1.5 rounded-full border-2 border-[#0f172a] hover:scale-110 transition">📸</button>
                    </div>
                    <div>
                        <h3 class="font-medium text-lg">المستخدم المتميز</h3>
                        <p class="text-slate-500 text-sm">مطور واجهات ومصمم UX</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm text-slate-400">اسم المستخدم</label>
                        <input type="text" value="EliteUser_2026" class="input-glass w-full px-4 py-2.5 rounded-xl">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm text-slate-400">البريد الإلكتروني</label>
                        <input type="email" value="user@elitedash.com" class="input-glass w-full px-4 py-2.5 rounded-xl">
                    </div>
                </div>
            </div>

            <div class="glass p-8 rounded-3xl">
                <h2 class="text-xl font-semibold mb-6">تفضيلات النظام</h2>
                <div class="space-y-6">
                    <div class="flex justify-between items-center pb-4 border-b border-white/5">
                        <div>
                            <p class="font-medium">الوضع الليلي الذكي</p>
                            <p class="text-xs text-slate-500">تبديل الواجهة بناءً على توقيت النظام</p>
                        </div>
                        <label class="switch">
                            <input type="checkbox" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="flex justify-between items-center pb-4 border-b border-white/5">
                        <div>
                            <p class="font-medium">تنبيهات البريد</p>
                            <p class="text-xs text-slate-500">استلام تقارير المبيعات الأسبوعية</p>
                        </div>
                        <label class="switch">
                            <input type="checkbox">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <div class="mt-8 flex justify-end gap-3">
                    <button class="px-6 py-2 rounded-xl text-slate-400 hover:text-white transition">إلغاء</button>
                    <button class="px-8 py-2 bg-blue-600 hover:bg-blue-700 rounded-xl font-medium shadow-lg shadow-blue-500/20 transition-all">حفظ التغييرات</button>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
