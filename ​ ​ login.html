<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EliteDash Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="fixed top-0 left-0 w-64 h-64 bg-blue-600/20 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2"></div>
    <div class="fixed bottom-0 right-0 w-96 h-96 bg-purple-600/10 rounded-full blur-3xl translate-x-1/3 translate-y-1/3"></div>

    <div class="glass-effect w-full max-w-md p-8 rounded-3xl shadow-2xl z-10">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-white tracking-tighter mb-2">ELITE<span class="text-blue-500">DASH</span></h1>
            <p class="text-slate-400 text-sm">Welcome back! Please enter your details.</p>
        </div>

        <form action="index.html" class="space-y-6">
            <div>
                <label class="block text-slate-300 text-sm font-medium mb-2">Email Address</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-3 top-3 w-5 h-5 text-slate-500"></i>
                    <input type="email" placeholder="name@company.com" 
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 px-10 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition">
                </div>
            </div>

            <div>
                <label class="block text-slate-300 text-sm font-medium mb-2">Password</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-3 top-3 w-5 h-5 text-slate-500"></i>
                    <input type="password" placeholder="••••••••" 
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 px-10 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition">
                </div>
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center text-slate-400">
                    <input type="checkbox" class="mr-2 rounded border-slate-700 bg-slate-900 text-blue-500"> Remember me
                </label>
                <a href="#" class="text-blue-500 hover:text-blue-400 font-medium">Forgot password?</a>
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl shadow-lg shadow-blue-600/20 transition transform hover:-translate-y-0.5">
                Sign In
            </button>
        </form>

        <p class="text-center text-slate-500 text-sm mt-8">
            Don't have an account? <a href="#" class="text-white hover:underline font-medium">Sign up for free</a>
        </p>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
