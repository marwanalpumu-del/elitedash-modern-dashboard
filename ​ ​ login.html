<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EliteDash Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        /* الخطوط الذكية */
        html[lang="ar"] body { font-family: 'Cairo', sans-serif; }
        html[lang="en"] body { font-family: 'Inter', sans-serif; }

        body { background-color: #f8fafc; transition: all 0.5s ease; overflow: hidden; }
        .dark body { background-color: #0f172a; }

        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
        .dark .glass-effect {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .blob {
            position: absolute; width: 500px; height: 500px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(147, 51, 234, 0.1) 100%);
            filter: blur(80px); border-radius: 50%; z-index: 0;
            animation: move 20s infinite alternate;
        }
        @keyframes move {
            from { transform: translate(-10%, -10%) rotate(0deg); }
            to { transform: translate(20%, 20%) rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 dark:text-white">

    <div class="fixed top-6 right-6 flex gap-3 z-50">
        <button onclick="toggleTheme()" class="glass-effect p-3 rounded-2xl hover:scale-110 transition-all text-slate-600 dark:text-yellow-400">
            <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
            <i data-lucide="moon" class="w-5 h-5 block dark:hidden text-blue-600"></i>
        </button>
        <button onclick="switchLang()" class="glass-effect px-4 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all dark:text-white">
            EN / AR
        </button>
    </div>

    <div class="blob" style="top: -100px; left: -100px;"></div>
    <div class="blob" style="bottom: -150px; right: -100px; animation-duration: 30s; background: rgba(59, 130, 246, 0.15);"></div>

    <div class="glass-effect w-full max-w-[440px] p-10 md:p-12 rounded-[2.5rem] z-10 relative">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-black text-slate-900 dark:text-white tracking-tighter mb-3 uppercase italic">
                Elite<span class="text-blue-500 not-italic">Dash</span>
            </h1>
            <p id="welcomeMessage" data-i18n="welcome" class="text-slate-500 dark:text-slate-400 text-sm font-medium tracking-wide">
                Welcome back! Please enter your details.
            </p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div class="space-y-2">
                <label class="block text-slate-500 dark:text-slate-300 text-[10px] font-bold uppercase tracking-[0.2em] ml-1">Identity (Name)</label>
                <div class="relative group">
                    <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                    <input type="text" id="userInput" required placeholder="Marwan" 
                        class="w-full bg-white dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 rounded-2xl py-4 pl-12 pr-4 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/40 transition-all duration-300">
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-slate-500 dark:text-slate-300 text-[10px] font-bold uppercase tracking-[0.2em] ml-1">Access Key</label>
                <div class="relative group">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                    <input type="password" id="passwordInput" required placeholder="••••••••" 
                        class="w-full bg-white dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 rounded-2xl py-4 pl-12 pr-12 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/40 transition-all duration-300">
                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-500 transition-colors">
                        <i id="eyeIcon" data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="loginBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-xl shadow-blue-600/20 transition-all duration-300 transform hover:-translate-y-1 active:scale-95 flex items-center justify-center group">
                <span id="btnText">Sign In</span>
                <i id="btnIcon" data-lucide="arrow-right" class="ml-2 w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
            </button>
        </form>
    </div>

    <script src="app.js"></script>
    <script>
        // إظهار وإخفاء كلمة المرور
        function togglePassword() {
            const passInput = document.getElementById('passwordInput');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passInput.type === "password") {
                passInput.type = "text";
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passInput.type = "password";
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        // معالجة تسجيل الدخول وربطه بـ app.js
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nameInput = document.getElementById('userInput').value;
            localStorage.setItem('userName', nameInput);
            
            const btnText = document.getElementById('btnText');
            btnText.innerText = (localStorage.getItem('appLang') === 'ar') ? "...جاري الدخول" : "Authenticating...";
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 800);
        });
    </script>
</body>
</html>
