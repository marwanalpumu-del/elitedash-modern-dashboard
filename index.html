<!DOCTYPE html>
<html lang="en" class="dark"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteDash | Premium SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-200 min-h-screen flex transition-colors duration-500">

    <aside class="w-72 border-r border-slate-200 dark:border-slate-800 p-8 hidden lg:flex flex-col h-screen sticky top-0 bg-white dark:bg-[#0f172a]">
        <h1 class="text-2xl font-black text-blue-600 dark:text-blue-500 italic mb-10 tracking-tighter">ELITEDASH</h1>
        <nav class="space-y-3 flex-1 text-right rtl:text-left">
            <a href="index.html" class="flex items-center p-4 bg-blue-600 text-white rounded-2xl shadow-lg shadow-blue-600/20 font-bold">
                <i data-lucide="layout-grid" class="mr-3 ml-3 w-5 h-5"></i> <span data-i18n="dash">Dashboard</span>
            </a>
            <a href="users.html" class="flex items-center p-4 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-2xl transition font-semibold">
                <i data-lucide="users" class="mr-3 ml-3 w-5 h-5"></i> <span data-i18n="users">Users</span>
            </a>
            <a href="orders.html" class="flex items-center p-4 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-2xl transition font-semibold">
                <i data-lucide="shopping-bag" class="mr-3 ml-3 w-5 h-5"></i> <span data-i18n="orders">Orders</span>
            </a>
        </nav>

        <div class="flex flex-col gap-3 mt-auto pt-6 border-t border-slate-100 dark:border-slate-800">
            <button onclick="toggleTheme()" class="flex items-center justify-center gap-2 p-3 bg-slate-100 dark:bg-slate-800 rounded-xl hover:scale-105 transition">
                <i data-lucide="sun" class="w-4 h-4 text-yellow-500 hidden dark:block"></i>
                <i data-lucide="moon" class="w-4 h-4 text-blue-600 block dark:hidden"></i>
                <span class="text-xs font-bold dark:text-white">Theme / النمط</span>
            </button>
            <button onclick="switchLang()" class="p-3 bg-slate-100 dark:bg-slate-800 rounded-xl text-xs font-bold hover:scale-105 transition">English / العربية</button>
        </div>
    </aside>

    <main class="flex-1 p-8 lg:p-12">
        <header class="mb-12 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-black"><span data-i18n="welcome">Welcome,</span> <span class="text-blue-600">Marwan</span>!</h2>
                <p class="text-slate-400 text-sm mt-1">System status: <span class="text-emerald-500 font-bold uppercase text-[10px]">Optimal</span></p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white dark:bg-slate-800/40 p-8 rounded-[2.5rem] border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-xl transition-all">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest" data-i18n="revenue">Revenue</p>
                <h3 class="text-4xl font-black mt-2 text-slate-900 dark:text-white">$45,230</h3>
                <div class="mt-4 flex items-center text-emerald-500 text-xs font-bold italic">
                    <i data-lucide="trending-up" class="w-4 h-4 mr-1 ml-1"></i> +12%
                </div>
            </div>
            </div>

        <div class="mt-10 bg-white dark:bg-slate-800/20 border border-slate-200 dark:border-slate-800 p-8 rounded-[3rem] h-64 flex items-center justify-center">
            <p class="text-slate-400 italic text-sm">Interactive Chart Rendering...</p>
        </div>
    </main>

    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
