<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>EliteDash | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen flex transition-all duration-300">

    <aside class="w-72 border-r border-slate-800 p-8 hidden lg:flex flex-col h-screen sticky top-0">
        <h1 class="text-2xl font-black text-blue-500 italic mb-10 tracking-tighter">ELITEDASH</h1>
        <nav class="space-y-3 flex-1">
            <a href="index.html" class="flex items-center p-4 bg-blue-600 text-white rounded-2xl shadow-lg shadow-blue-600/20 font-bold">
                <i data-lucide="layout-grid" class="mr-3 ml-3 w-5 h-5"></i> <span data-i18n="dash">Dashboard</span>
            </a>
            <a href="users.html" class="flex items-center p-4 text-slate-400 hover:bg-slate-800 rounded-2xl transition font-semibold">
                <i data-lucide="users" class="mr-3 ml-3 w-5 h-5"></i> <span data-i18n="users">Users</span>
            </a>
            <a href="orders.html" class="flex items-center p-4 text-slate-400 hover:bg-slate-800 rounded-2xl transition font-semibold">
                <i data-lucide="shopping-bag" class="mr-3 ml-3 w-5 h-5"></i> <span data-i18n="orders">Orders</span>
            </a>
            <a href="settings.html" class="flex items-center p-4 text-slate-400 hover:bg-slate-800 rounded-2xl transition font-semibold">
                <i data-lucide="settings" class="mr-3 ml-3 w-5 h-5"></i> <span data-i18n="settings">Settings</span>
            </a>
        </nav>
        <button onclick="switchLang()" class="mt-4 p-4 bg-slate-800/50 border border-slate-700 rounded-2xl text-xs font-bold hover:bg-slate-700 transition">English / العربية</button>
    </aside>

    <main class="flex-1 p-8 lg:p-12">
        <header class="mb-10 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold"><span data-i18n="welcome">Welcome,</span> <span id="userNameDisplay" class="text-blue-500 italic">Admin</span>!</h2>
                <p class="text-slate-500 text-sm mt-1" data-i18n="status">System Operational</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-slate-800/40 p-8 rounded-[2rem] border border-slate-700/50 hover:border-blue-500/50 transition">
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest" data-i18n="revenue">Revenue</p>
                <h3 class="text-4xl font-black mt-2 text-white">$45,230</h3>
                <div class="text-emerald-500 text-[10px] font-bold mt-2">+12.5% ↑</div>
            </div>
            <div class="bg-slate-800/40 p-8 rounded-[2rem] border border-slate-700/50 hover:border-blue-500/50 transition">
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest" data-i18n="sales">Total Sales</p>
                <h3 class="text-4xl font-black mt-2 text-white">1,284</h3>
            </div>
            <div class="bg-slate-800/40 p-8 rounded-[2rem] border border-slate-700/50 hover:border-blue-500/50 transition">
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest" data-i18n="growth">Growth</p>
                <h3 class="text-4xl font-black mt-2 text-blue-500">24%</h3>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
