<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteDash | Premium Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-link:hover { background: rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="text-slate-200">

    <div class="min-h-screen flex">
        <aside class="w-64 bg-[#1e293b] border-r border-slate-800 hidden md:flex flex-col">
            <div class="p-6">
                <h1 class="text-2xl font-bold text-blue-500 tracking-tighter">ELITE<span class="text-white">DASH</span></h1>
            </div>
            <nav class="flex-1 px-4 space-y-2">
                <a href="index.html" class="flex items-center p-3 bg-blue-600 text-white rounded-lg">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Overview
                </a>
                <a href="analytics.html" class="flex items-center p-3 text-slate-400 nav-link rounded-lg transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    Analytics
                </a>
                <a href="products.html" class="flex items-center p-3 text-slate-400 nav-link rounded-lg transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                    Products
                </a>
                <a href="settings.html" class="flex items-center p-3 text-slate-400 nav-link rounded-lg transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                    Settings
                </a>
            </nav>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-bold text-white tracking-tight">Dashboard Overview</h2>
                    <p class="text-slate-400">Welcome back, Developer.</p>
                </div>
                <div class="flex items-center space-x-4">
                    <img class="w-10 h-10 rounded-full border-2 border-blue-500 shadow-lg shadow-blue-500/20" src="https://ui-avatars.com/api/?name=Elite+User&background=3b82f6&color=fff" alt="Avatar">
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="glass-card p-6 rounded-2xl hover:scale-[1.02] transition-transform cursor-pointer">
                    <p class="text-slate-400 text-sm font-medium">Monthly Revenue</p>
                    <h3 class="text-2xl font-bold text-white mt-1">$45,231.89</h3>
                    <span class="text-green-400 text-sm font-semibold">↑ +12.5%</span>
                </div>
                <div class="glass-card p-6 rounded-2xl hover:scale-[1.02] transition-transform cursor-pointer">
                    <p class="text-slate-400 text-sm font-medium">Active Users</p>
                    <h3 class="text-2xl font-bold text-white mt-1">2,405</h3>
                    <span class="text-blue-400 text-sm font-semibold">↑ +4.2%</span>
                </div>
                <div class="glass-card p-6 rounded-2xl hover:scale-[1.02] transition-transform cursor-pointer">
                    <p class="text-slate-400 text-sm font-medium">Conversion Rate</p>
                    <h3 class="text-2xl font-bold text-white mt-1">3.48%</h3>
                    <span class="text-slate-400 text-sm">Target: 4.0%</span>
                </div>
            </div>

            <div class="glass-card p-8 rounded-3xl shadow-xl">
                <h3 class="text-xl font-semibold mb-6">Sales Performance</h3>
                <div id="mainChart"></div>
            </div>
        </main>
    </div>

    <script>
        var options = {
            series: [{
                name: 'Sales',
                data: [31, 40, 28, 51, 42, 109, 100]
            }],
            chart: {
                height: 300,
                type: 'area',
                toolbar: { show: false },
                foreColor: '#94a3b8'
            },
            dataLabels: { enabled: false },
            stroke: { curve: 'smooth', colors: ['#3b82f6'] },
            fill: {
                type: 'gradient',
                gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0.0, stops: [0, 90, 100] }
            },
            xaxis: {
                categories: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"],
                axisBorder: { show: false },
                axisTicks: { show: false }
            },
            grid: { borderColor: 'rgba(255,255,255,0.05)' },
            tooltip: { theme: 'dark' }
        };

        var chart = new ApexCharts(document.querySelector("#mainChart"), options);
        chart.render();
    </script>
</body>
</html>
