<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteDash | Premium Admin Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <div class="min-h-screen flex">
        <aside class="w-64 bg-[#1e293b] border-r border-slate-800 hidden md:flex flex-col">
            <div class="p-6">
                <h1 class="text-2xl font-bold text-blue-500 tracking-tighter uppercase">Elite<span class="text-white">Dash</span></h1>
            </div>
            
            <nav class="flex-1 px-4 space-y-2">
                <a href="index.html" class="flex items-center p-3 bg-blue-600 text-white rounded-xl shadow-lg shadow-blue-500/20">
                    <i data-lucide="layout-dashboard" class="mr-3 w-5 h-5"></i>
                    Overview
                </a>
                <a href="users.html" class="flex items-center p-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition-all">
                    <i data-lucide="users" class="mr-3 w-5 h-5"></i>
                    Users
                </a>
                <a href="settings.html" class="flex items-center p-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition-all">
                    <i data-lucide="settings" class="mr-3 w-5 h-5"></i>
                    Settings
                </a>
            </nav>

            <div class="p-4 border-t border-slate-800">
                <a href="login.html" class="flex items-center p-3 text-red-400 hover:bg-red-400/10 rounded-xl transition-all">
                    <i data-lucide="log-out" class="mr-3 w-5 h-5"></i>
                    Logout
                </a>
            </div>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <header class="flex flex-wrap justify-between items-center gap-4 mb-10">
                <div class="flex-1 min-w-[200px]">
                    <h2 class="text-2xl md:text-3xl font-bold text-white tracking-tight">Analytics Overview</h2>
                    <p class="text-slate-400 text-sm">Monitoring performance and revenue.</p>
                </div>
                
                <div class="flex items-center space-x-3 md:space-x-4">
                    <button class="bg-slate-800 p-2.5 rounded-xl border border-slate-700 hover:bg-slate-700 transition">
                        <i data-lucide="bell" class="w-5 h-5 text-slate-300"></i>
                    </button>

                    <div class="relative">
                        <button id="userMenuBtn" class="flex items-center space-x-2 bg-slate-800/50 p-1.5 pr-4 rounded-2xl border border-slate-700 shrink-0 hover:bg-slate-700 transition-all outline-none">
                            <img class="w-8 h-8 rounded-xl border border-blue-500 object-cover" src="https://ui-avatars.com/api/?name=Marwan&background=0D8ABC&color=fff" alt="Marwan">
                            <span class="text-xs md:text-sm font-semibold text-white whitespace-nowrap">Marwan</span>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>
                        </button>

                        <div id="userDropdown" class="hidden absolute right-0 mt-3 w-48 glass-card rounded-2xl p-2 z-50 shadow-2xl border border-white/10">
                            <a href="settings.html" class="flex items-center space-x-2 p-2 hover:bg-blue-600/20 hover:text-blue-400 rounded-xl transition text-sm">
                                <i data-lucide="user" class="w-4 h-4"></i>
                                <span>Profile</span>
                            </a>
                            <a href="settings.html" class="flex items-center space-x-2 p-2 hover:bg-blue-600/20 hover:text-blue-400 rounded-xl transition text-sm">
                                <i data-lucide="settings" class="w-4 h-4"></i>
                                <span>Settings</span>
                            </a>
                            <div class="h-[1px] bg-slate-700 my-1"></div>
                            <a href="login.html" class="flex items-center space-x-2 p-2 hover:bg-red-500/20 text-red-400 rounded-xl transition text-sm">
                                <i data-lucide="log-out" class="w-4 h-4"></i>
                                <span>Logout</span>
                            </a>
                        </div>
                    </div>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="glass-card p-6 rounded-3xl">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">Total Revenue</p>
                            <h3 class="text-2xl font-bold text-white mt-2">$45,231.89</h3>
                        </div>
                        <span class="p-2 bg-green-500/10 text-green-500 rounded-lg text-xs font-bold">↑ 12%</span>
                    </div>
                </div>
                <div class="glass-card p-6 rounded-3xl">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">Active Users</p>
                            <h3 class="text-2xl font-bold text-white mt-2">2,405</h3>
                        </div>
                        <span class="p-2 bg-blue-500/10 text-blue-500 rounded-lg text-xs font-bold">↑ 4%</span>
                    </div>
                </div>
                <div class="glass-card p-6 rounded-3xl">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">Conversion</p>
                            <h3 class="text-2xl font-bold text-white mt-2">3.2%</h3>
                        </div>
                        <span class="p-2 bg-purple-500/10 text-purple-500 rounded-lg text-xs font-bold">Stable</span>
                    </div>
                </div>
            </div>

            <div class="glass-card p-8 rounded-3xl border border-slate-800">
                <div class="flex justify-between items-center mb-8">
                    <h4 class="text-lg font-bold text-white">Revenue Growth</h4>
                    <select class="bg-slate-900 border border-slate-700 text-slate-400 text-xs rounded-lg p-2 outline-none">
                        <option>Last 7 Days</option>
                        <option>Last 30 Days</option>
                    </select>
                </div>
                <div id="main-chart" class="w-full"></div> 
            </div>
        </main>
    </div>

    <script>
        // 1. تهيئة الأيقونات
        lucide.createIcons();

        // 2. وظيفة تحديث بيانات المستخدم من الذاكرة المحلية (LocalStorage)
        function loadUserData() {
            const savedName = localStorage.getItem('userName');
            if (savedName) {
                // تحديث نصوص الاسم
                const nameElements = document.querySelectorAll('#userMenuBtn span');
                nameElements.forEach(el => el.innerText = savedName);

                // تحديث صورة البروفايل ديناميكياً
                const profileImages = document.querySelectorAll('img[alt="Marwan"]');
                profileImages.forEach(img => {
                    img.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(savedName)}&background=0D8ABC&color=fff`;
                });
            }
        }

        // 3. تشغيل القائمة المنسدلة
        const userBtn = document.getElementById('userMenuBtn');
        const userMenu = document.getElementById('userDropdown');

        userBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            userMenu.classList.toggle('hidden');
        });

        document.addEventListener('click', () => {
            userMenu.classList.add('hidden');
        });

        // 4. إعدادات ApexCharts
        var options = {
            chart: {
                type: 'area',
                height: 350,
                toolbar: { show: false },
                fontFamily: 'Inter, sans-serif',
                foreColor: '#94a3b8',
                animations: { enabled: true, easing: 'easeinout', speed: 800 }
            },
            stroke: { curve: 'smooth', width: 3, colors: ['#3b82f6'] },
            fill: {
                type: 'gradient',
                gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0.05, stops: [0, 100] }
            },
            dataLabels: { enabled: false },
            colors: ['#3b82f6'],
            series: [{
                name: 'Revenue',
                data: [4200, 5800, 4900, 7100, 8200, 12500, 11000]
            }],
            xaxis: {
                categories: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                axisBorder: { show: false },
                axisTicks: { show: false }
            },
            grid: { borderColor: '#1e293b', strokeDashArray: 4 },
            tooltip: { theme: 'dark' }
        };

        var chart = new ApexCharts(document.querySelector("#main-chart"), options);
        chart.render();

        // 5. تشغيل الوظائف عند تحميل المستند
        document.addEventListener('DOMContentLoaded', loadUserData);
    </script>
</body>
</html>
