<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteDash | Premium Dual-Theme Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .glass-card { backdrop-filter: blur(12px); transition: all 0.3s ease; }
        .dark .glass-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }
        .light .glass-card { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0, 0, 0, 0.05); }
        
        @media (max-width: 768px) {
            main { padding-bottom: 90px; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100">

    <div class="min-h-screen flex">
        <aside class="w-64 bg-white dark:bg-[#1e293b] border-r border-slate-200 dark:border-slate-800 hidden md:flex flex-col transition-colors sticky top-0 h-screen">
            <div class="p-6">
                <h1 class="text-2xl font-bold text-blue-500 tracking-tighter uppercase">Elite<span class="text-slate-900 dark:text-white">Dash</span></h1>
            </div>
            
            <nav class="flex-1 px-4 space-y-2">
                <a href="index.html" class="flex items-center p-3 bg-blue-600 text-white rounded-xl shadow-lg shadow-blue-500/20">
                    <i data-lucide="layout-dashboard" class="mr-3 w-5 h-5"></i> Overview
                </a>
                <a href="users.html" class="flex items-center p-3 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all">
                    <i data-lucide="users" class="mr-3 w-5 h-5"></i> Users
                </a>
                <a href="orders.html" class="flex items-center p-3 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all">
                    <i data-lucide="shopping-bag" class="mr-3 w-5 h-5"></i> Orders
                </a>
                <a href="invoices.html" class="flex items-center p-3 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all">
                    <i data-lucide="file-text" class="mr-3 w-5 h-5"></i> Invoices
                </a>
                <a href="settings.html" class="flex items-center p-3 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all">
                    <i data-lucide="settings" class="mr-3 w-5 h-5"></i> Settings
                </a>
            </nav>

            <div class="p-4 border-t border-slate-200 dark:border-slate-800">
                <a href="login.html" class="flex items-center p-3 text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 rounded-xl transition-all">
                    <i data-lucide="log-out" class="mr-3 w-5 h-5"></i> Logout
                </a>
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-8 overflow-y-auto">
            <header class="flex justify-between items-center gap-4 mb-10">
                <div class="flex-1">
                    <h2 class="text-xl md:text-3xl font-bold tracking-tight">Analytics Overview</h2>
                    <p class="text-slate-500 dark:text-slate-400 text-xs md:sm">Performance and revenue monitoring.</p>
                </div>
                
                <div class="flex items-center space-x-2 md:space-x-4">
                    <button id="themeToggle" class="bg-white dark:bg-slate-800 p-2 md:p-2.5 rounded-xl border border-slate-200 dark:border-slate-700 transition">
                        <i id="themeIcon" data-lucide="moon" class="w-4 h-4 md:w-5 md:h-5"></i>
                    </button>

                    <div class="relative">
                        <button id="userMenuBtn" class="flex items-center space-x-2 bg-white dark:bg-slate-800/50 p-1 md:p-1.5 pr-3 md:pr-4 rounded-2xl border border-slate-200 dark:border-slate-700 shrink-0 outline-none">
                            <img id="mainAvatar" class="w-7 h-7 md:w-8 md:h-8 rounded-xl border border-blue-500 object-cover" src="https://ui-avatars.com/api/?name=Marwan&background=0D8ABC&color=fff" alt="User">
                            <span id="userNameDisplay" class="text-[10px] md:text-sm font-semibold whitespace-nowrap">Marwan</span>
                            <i data-lucide="chevron-down" class="w-3 h-3 md:w-4 md:h-4 text-slate-400"></i>
                        </button>
                    </div>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-8">
                <div class="glass-card p-5 md:p-6 rounded-3xl">
                    <p class="text-slate-500 dark:text-slate-400 text-[10px] font-bold uppercase tracking-wider">Total Revenue</p>
                    <h3 class="text-xl md:text-2xl font-bold mt-2">$45,231.89</h3>
                </div>
                <div class="glass-card p-5 md:p-6 rounded-3xl">
                    <p class="text-slate-500 dark:text-slate-400 text-[10px] font-bold uppercase tracking-wider">Active Users</p>
                    <h3 class="text-xl md:text-2xl font-bold mt-2">2,405</h3>
                </div>
                <div class="glass-card p-5 md:p-6 rounded-3xl">
                    <p class="text-slate-500 dark:text-slate-400 text-[10px] font-bold uppercase tracking-wider">Conversion</p>
                    <h3 class="text-xl md:text-2xl font-bold mt-2">3.2%</h3>
                </div>
            </div>

            <div class="glass-card p-5 md:p-8 rounded-3xl">
                <h4 class="text-base md:text-lg font-bold mb-6">Revenue Growth</h4>
                <div id="main-chart" class="w-full"></div> 
            </div>
        </main>
    </div>

    <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-[#1e293b]/90 backdrop-blur-xl border-t border-slate-200 dark:border-slate-800 px-2 py-3 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center text-blue-600">
            <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
            <span class="text-[8px] mt-1 font-bold">Home</span>
        </a>
        <a href="users.html" class="flex flex-col items-center text-slate-400">
            <i data-lucide="users" class="w-5 h-5"></i>
            <span class="text-[8px] mt-1 font-medium">Users</span>
        </a>
        <a href="orders.html" class="flex flex-col items-center text-slate-400">
            <i data-lucide="shopping-bag" class="w-5 h-5"></i>
            <span class="text-[8px] mt-1 font-medium">Orders</span>
        </a>
        <a href="invoices.html" class="flex flex-col items-center text-slate-400">
            <i data-lucide="file-text" class="w-5 h-5"></i>
            <span class="text-[8px] mt-1 font-medium">Bills</span>
        </a>
        <a href="settings.html" class="flex flex-col items-center text-slate-400">
            <i data-lucide="settings" class="w-5 h-5"></i>
            <span class="text-[8px] mt-1 font-medium">Settings</span>
        </a>
    </div>

    <script>
        lucide.createIcons();
        // ... نفس كود الـ JavaScript السابق الخاص بك ...
        function loadUserData() {
            const savedName = localStorage.getItem('userName') || 'Marwan';
            const savedAvatar = localStorage.getItem('userAvatar');
            document.getElementById('userNameDisplay').innerText = savedName;
            const mainAvatar = document.getElementById('mainAvatar');
            if (savedAvatar) {
                mainAvatar.src = savedAvatar;
            } else {
                mainAvatar.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(savedName)}&background=0D8ABC&color=fff`;
            }
        }

        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const html = document.documentElement;

        function updateTheme(isDark) {
            if (isDark) {
                html.classList.add('dark');
                html.classList.remove('light');
                themeIcon.setAttribute('data-lucide', 'sun');
            } else {
                html.classList.add('light');
                html.classList.remove('dark');
                themeIcon.setAttribute('data-lucide', 'moon');
            }
            lucide.createIcons();
        }

        themeToggle.addEventListener('click', () => {
            const isDark = html.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateTheme(isDark);
        });

        var options = {
            chart: { type: 'area', height: 300, toolbar: { show: false }, fontFamily: 'Inter, sans-serif' },
            stroke: { curve: 'smooth', width: 3 },
            series: [{ name: 'Revenue', data: [4200, 5800, 4900, 7100, 8200, 12500, 11000] }],
            xaxis: { categories: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'] },
            colors: ['#3b82f6'],
            theme: { mode: 'dark' }
        };

        window.chart = new ApexCharts(document.querySelector("#main-chart"), options);
        window.chart.render();

        document.addEventListener('DOMContentLoaded', () => {
            loadUserData();
            const savedTheme = localStorage.getItem('theme') || 'dark';
            updateTheme(savedTheme === 'dark');
        });
    </script>
</body>
</html>
