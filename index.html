<style>
  /* إضافة تأثير "التحميل المبدئي" ليكون المستخدم مستعداً للفخامة */
  #root:empty {
    background: #020617;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }
  #root:empty::after {
    content: "";
    width: 40px;
    height: 40px;
    border: 3px solid rgba(192, 132, 252, 0.1);
    border-top-color: #c084fc;
    border-radius: 50%;
    animation: loading 0.8s linear infinite;
  }
  @keyframes loading {
    to { transform: rotate(360deg); }
  }
</style>

  <body>
    <noscript>يجب تمكين JavaScript لتشغيل هذا النظام الآمن.</noscript>
    
    <div id="root"></div>

  </body>
</html>
