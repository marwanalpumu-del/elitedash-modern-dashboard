<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>EliteDash | Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen flex">

    <aside class="w-72 border-r border-slate-800 p-8 hidden lg:flex flex-col h-screen sticky top-0">
        <h1 class="text-2xl font-black text-blue-500 italic mb-10 tracking-tighter">ELITEDASH</h1>
        <nav class="space-y-3 flex-1">
            <a href="index.html" class="flex items-center p-4 text-slate-400 hover:bg-slate-800 rounded-2xl transition font-semibold">
                <i data-lucide="layout-grid" class="mr-3 ml-3 w-5 h-5"></i> <span data-i18n="dash">Dashboard</span>
            </a>
            <a href="users.html" class="flex items-center p-4 bg-blue-600 text-white rounded-2xl shadow-lg shadow-blue-600/20 font-bold">
                <i data-lucide="users" class="mr-3 ml-3 w-5 h-5"></i> <span data-i18n="users">Users</span>
            </a>
            <a href="orders.html" class="flex items-center p-4 text-slate-400 hover:bg-slate-800 rounded-2xl transition font-semibold">
                <i data-lucide="shopping-bag" class="mr-3 ml-3 w-5 h-5"></i> <span data-i18n="orders">Orders</span>
            </a>
            <a href="settings.html" class="flex items-center p-4 text-slate-400 hover:bg-slate-800 rounded-2xl transition font-semibold">
                <i data-lucide="settings" class="mr-3 ml-3 w-5 h-5"></i> <span data-i18n="settings">Settings</span>
            </a>
        </nav>
        <button onclick="switchLang()" class="mt-4 p-4 bg-slate-800/50 border border-slate-700 rounded-2xl text-xs font-bold">English / العربية</button>
    </aside>

    <main class="flex-1 p-8 lg:p-12">
        <header class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-bold" data-i18n="users">User Directory</h2>
            <button class="bg-blue-600 px-6 py-3 rounded-2xl font-bold shadow-lg shadow-blue-600/20" data-i18n="add">Add Member</button>
        </header>

        <div class="bg-slate-800/40 rounded-[2.5rem] border border-slate-800 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-900/50 text-slate-500 text-[10px] uppercase font-black tracking-widest">
                    <tr>
                        <th class="p-8" data-i18n="nameLabel">User</th>
                        <th class="p-8" data-i18n="roleLabel">Role</th>
                        <th class="p-8" data-i18n="statusLabel">Status</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-800">
                    <tr>
                        <td class="p-8 flex items-center">
                            <div class="w-10 h-10 bg-indigo-500 rounded-xl mr-4 ml-4 shadow-lg shadow-indigo-500/20"></div>
                            <div><p class="font-bold">Ahmed Hassan</p><p class="text-xs text-slate-500 italic">ahmed@elite.com</p></div>
                        </td>
                        <td class="p-8"><span class="bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full text-[10px] font-bold">Administrator</span></td>
                        <td class="p-8 text-emerald-500 text-xs font-bold italic">Active</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
